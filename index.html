<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pollen & Air Quality Tracker</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header>
            <div class="city-picker-wrapper">
                <label for="city-select" class="city-picker-label">Select City</label>
                <select id="city-select" class="city-select"></select>
            </div>
            <div id="danger-badge-container"></div>
            <h1>Pollen Tracker</h1>
            <p class="subtitle" id="report-date"></p>
        </header>

        <div class="powered-by" id="powered-by"></div>

        <section id="breathable-score-section"></section>

        <section id="aqi-section">
            <h2 class="section-title">Air Quality Index</h2>
            <div id="aqi-container" class="aqi-container">
                <!-- AQI cards injected here -->
            </div>
        </section>

        <main class="pollen-grid" id="pollen-container">
            <!-- Pollen cards with species details injected here -->
        </main>

        <section id="health-guidance-section"></section>

        <section id="alerts-section"></section>

        <footer>
            <p id="last-updated"></p>
            <div class="footer-links">
                <a href="#" onclick="window.__showPrivacyPolicy(); return false;">Privacy Policy</a>
                <span class="footer-sep">|</span>
                <a href="#" onclick="window.__showTermsOfService(); return false;">Terms of Service</a>
            </div>
            <p class="copyright">&copy; 2026 PollenTracker All rights reserved.</p>
        </footer>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
